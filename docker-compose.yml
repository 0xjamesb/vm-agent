services:
  vm-agent-mcp:
    build: .
    # HTTP mode for shared/team deployment
    command: ["--transport", "streamable-http", "--port", "8080"]
    ports:
      - "8080:8080"
    environment:
      MCP_TRANSPORT: streamable-http
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8080"
    volumes:
      # Persist audit logs and cache across container restarts
      - ./data:/app/data
    restart: unless-stopped
